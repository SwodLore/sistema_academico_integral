spring.application.name=sistema-academico

# Base de datos (en produccion se inyectan por variables de entorno)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sistema_academico}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root1234}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.show-sql=${SHOW_SQL:true}
server.port=${PORT:8080}

app.jwt.secret=${JWT_SECRET:7a9f3c2e1b4d6e8f0a2c4e6d8b0f2a4c6e8d0b2f4a6c8e0d2b4f6a8c0e2d4f6}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Origenes permitidos para CORS, separados por coma
app.cors.origins=${CORS_ORIGINS:http://localhost:5173}

# URL publica del backend (para el QR de verificacion de certificados)
app.base-url=${APP_BASE_URL:http://localhost:8080}

app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
